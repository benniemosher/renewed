name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: >
          xcodebuild build
          -project Renewed.xcodeproj
          -scheme Renewed
          -sdk iphonesimulator
          -destination "generic/platform=iOS Simulator"

  test:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve simulator destination
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name']); sys.exit(0)
          sys.exit(1)")
          echo "destination=platform=iOS Simulator,name=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Test
        run: >
          xcodebuild test
          -project Renewed.xcodeproj
          -scheme Renewed
          -sdk iphonesimulator
          -destination "${{ steps.sim.outputs.destination }}"
