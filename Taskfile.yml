version: "3"

tasks:
  default:
    cmds:
      - task --list

  bootstrap:
    desc: First-time setup
    cmds:
      - brew bundle check || brew bundle
      - pre-commit install --hook-type pre-commit --hook-type pre-push
      - echo "Bootstrap complete!"

  test:
    desc: Run unit tests
    cmds:
      - xcodebuild test -project Renewed.xcodeproj -scheme Renewed -sdk iphonesimulator -destination "platform=iOS Simulator,name=iPhone 15"

  lint:
    desc: Run pre-commit hooks
    cmds:
      - pre-commit run --all-files

  build:
    desc: Build the project
    cmds:
      - xcodebuild build -project Renewed.xcodeproj -scheme Renewed -sdk iphonesimulator

  run:
    desc: Build, install, and launch on simulator
    cmds:
      - xcrun simctl boot "iPhone 15" 2>/dev/null || true
      - open -a Simulator
      - task: build
      - |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData/Renewed-*/Build/Products/Debug-iphonesimulator -name "Renewed.app" -type d | head -n 1)
        xcrun simctl install booted "$APP_PATH"
        xcrun simctl launch booted com.benniemosher.renewed

  watch:
    desc: Watch for changes and auto-rebuild/relaunch
    deps: [run]
    cmds:
      - |
        echo "Watching for changes... (Ctrl+C to stop)"
        fswatch -o Sources/ Widget/ | while read -r event; do
          echo "=== Rebuilding at $(date '+%H:%M:%S') ==="
          xcrun simctl terminate booted com.benniemosher.renewed 2>/dev/null || true
          task run
        done

  ci:
    desc: Full CI check (build + test)
    cmds:
      - task: build
      - task: test

  clean:
    desc: Clean build artifacts
    cmds:
      - xcodebuild clean -project Renewed.xcodeproj -scheme Renewed
      - rm -rf ~/Library/Developer/Xcode/DerivedData/Renewed-*
