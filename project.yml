name: Renewed
bundleIdPrefix: com.benniemosher
deploymentTarget:
  iOS: "16.0"

configs:
  Debug: debug
  Release: release

targets:
  Renewed:
    type: application
    platform: iOS
    bundleId: com.benniemosher.renewed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benniemosher.renewed
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Sources
        createIntermediateGroups: true
      - path: Resources/Assets.xcassets
    resources:
      - Resources
    entitlements:
      path: Sources/Config/Renewed.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.$(CFBundleIdentifier)
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - group.com.benniemosher.renewed
    info:
      path: Sources/Config/Info.plist
      properties:
        CFBundleDisplayName: Renewed
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate

  RenewedWidget:
    type: app-extension
    subtype: widget
    platform: iOS
    bundleId: com.benniemosher.renewed.widget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benniemosher.renewed.widget
    sources:
      - path: Widget/Sources
        createIntermediateGroups: true
    resources:
      - Widget/Resources
    entitlements:
      path: Widget/Config/RenewedWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.benniemosher.renewed
    info:
      path: Widget/Config/Info.plist
      properties:
        CFBundleDisplayName: Renewed Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).Widget

  RenewedTests:
    type: bundle.unit-test
    platform: iOS
    bundleId: com.benniemosher.renewed.tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benniemosher.renewed.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Renewed.app/Renewed"
    sources:
      - path: Tests/Unit
        createIntermediateGroups: true
    dependencies:
      - target: Renewed
    info:
      path: Tests/Info.plist

  RenewedUITests:
    type: bundle.ui-testing
    platform: iOS
    bundleId: com.benniemosher.renewed.ui-tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benniemosher.renewed.ui-tests
        TEST_TARGET_NAME: Renewed
    sources:
      - path: Tests/UI
        createIntermediateGroups: true
    dependencies:
      - target: Renewed
    info:
      path: Tests/Info.plist

schemes:
  Renewed:
    build:
      targets:
        Renewed: all
        RenewedWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: RenewedTests
          coverage: true
        - name: RenewedUITests
