repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: detect-private-key

  - repo: local
    hooks:
      - id: swift-format
        name: Swift Format
        entry: swift-format
        language: system
        files: '\.swift$'
        pass_filenames: true
        args: ["--in-place", "--recursive"]
        stages: [pre-commit]
        # Skip if swift-format not installed
        require_serial: false

      - id: xcodegen
        name: Regenerate Xcode Project
        entry: bash -c 'xcodegen generate && git add Renewed.xcodeproj'
        language: system
        files: 'project\.yml$'
        pass_filenames: false
        stages: [pre-commit]

      - id: xcode-test
        name: Xcode Tests
        entry: bash -c 'xcodebuild test -project Renewed.xcodeproj -scheme Renewed -sdk iphonesimulator -destination "platform=iOS Simulator,name=iPhone 15" -quiet'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
